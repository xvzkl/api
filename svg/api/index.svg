<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="854" height="180" viewBox="0 0 854 180">
  <style>
    /* 默认隐藏所有变体 */
    .variant { display: none; }
    
    /* 当片段匹配时显示对应内容 */
    #hello:target { display: block; }
    #world:target { display: block; }
    #default:target { display: block; }
    
    /* 如果没有匹配片段，显示默认 */
    svg:not(:has(*:target)) #default { display: block; }
  </style>
  
  <!-- 预设的三个变体 -->
  <g id="hello">
    <rect width="100%" height="100%" fill="#FF6B6B"/>
    <text x="427" y="100" text-anchor="middle" fill="white" font-size="50">Hello</text>
  </g>
  
  <g id="world">
    <rect width="100%" height="100%" fill="#4ECDC4"/>
    <text x="427" y="100" text-anchor="middle" fill="white" font-size="50">World</text>
  </g>
  
  <g id="default">
    <rect width="100%" height="100%" fill="#1a1a1a"/>
    <text x="427" y="100" text-anchor="middle" fill="white" font-size="50">Default</text>
  </g>
</svg>
