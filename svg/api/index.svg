<svg xmlns="http://www.w3.org/2000/svg" width="854" height="180" viewBox="0 0 854 180" onload="run()">
  <script type="text/javascript"><![CDATA[
    function run() {
      const svg = document.currentScript.ownerDocument;
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || 'Hello';
      const sub = params.get('sub') || 'GitHub Pages';
      
      const titleEl = svg.getElementById('title');
      const subEl = svg.getElementById('sub');
      
      titleEl.textContent = title;
      subEl.textContent = sub;
    }
  ]]></script>

  <rect width="100%" height="100%" fill="#1a1a1a"/>
  
  <style>
    .title { font-size: 40px; font-weight: bold; }
    .sub { font-size: 22px; }
  </style>

  <path fill="#5433FF" opacity="0.3" d="M0 100 Q 213 140 427 110 T 854 130 L 854 180 L 0 180 Z">
    <animate attributeName="d" dur="12s" repeatCount="indefinite"
      values="M0 100 Q 213 140 427 110 T 854 130 L 854 180 L 0 180 Z;
              M0 120 Q 213 110 427 130 T 854 110 L 854 180 L 0 180 Z;
              M0 100 Q 213 140 427 110 T 854 130 L 854 180 L 0 180 Z"/>
  </path>

  <text id="title" x="427" y="80" text-anchor="middle" fill="white" class="title"></text>
  <text id="sub" x="427" y="115" text-anchor="middle" fill="white" class="sub"></text>
</svg>
